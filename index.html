<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极简导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 地图全屏 */
        #map {
            width: 100%;
            height: 100%;
        }

        /* 顶部控制面板 */
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }
        #panel input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            margin-bottom: 8px;
        }
        #panel .btn-row {
            display: flex;
            gap: 8px;
        }
        #panel button {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #panel button.active {
            color: #fff;
            background: #007AFF;
        }
        #panel button:not(.active) {
            background: #f0f0f0;
            color: #333;
        }
        #panel button.go-btn {
            background: #34C759;
            color: #fff;
        }

        /* 底部信息栏 */
        #info {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            text-align: center;
            font-size: 15px;
            color: #333;
        }
        #info .distance {
            font-size: 28px;
            font-weight: 700;
            color: #007AFF;
        }
        #info .time {
            color: #666;
            margin-top: 4px;
        }
        #info .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        #info .btn-row button {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        #btn-manual-locate {
            background: #FF9500;
        }
        #btn-start-nav {
            background: #007AFF;
        }
    </style>
</head>
<body>
    <!-- 地图容器 -->
    <div id="map"></div>

    <!-- 顶部搜索面板 -->
    <div id="panel">
        <input type="text" id="destination" placeholder="输入目的地">
        <div class="btn-row">
            <button id="btn-driving" class="active">🚗 驾车</button>
            <button id="btn-walking">🚶 步行</button>
            <button id="btn-go" class="go-btn">规划路线</button>
        </div>
    </div>

    <!-- 底部距离信息 -->
    <div id="info">
        <div>距离目的地</div>
        <div class="distance" id="distance-text">-- 公里</div>
        <div class="time" id="time-text">预计用时：--</div>
        <div class="btn-row">
            <button id="btn-manual-locate">📍 手动定位(以此处为起点)</button>
            <button id="btn-start-nav" style="display: none;">▶ 开始导航</button>
        </div>
    </div>

    <!-- 百度地图 JS API -->
    <script src="https://api.map.baidu.com/api?v=3.0&ak=VHJ9he6w5vzGuD6cFGcBsiOIOieo51D7"></script>
    <script>
        // ========== 全局变量 ==========
        var map = new BMap.Map("map");
        var myLocation = null;       // 用户当前位置
        var destinationPoint = null; // 目的地坐标
        var currentRoute = null;    // 当前路线
        var travelMode = 'driving'; // 默认驾车
        var watchId = null;        // 位置监听ID
        var isManualLocationSet = false; // 是否已手动定位并锁定

        // ========== 初始化地图 ==========
        var defaultPoint = new BMap.Point(116.404, 39.915);
        map.centerAndZoom(defaultPoint, 15);
        map.enableScrollWheelZoom(true);

        // ========== 获取用户位置（高精度，仅初始用） ==========
        function getMyLocation(callback) {
            if (navigator.geolocation) {
                var options = {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                };
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        myLocation = new BMap.Point(pos.coords.longitude, pos.coords.latitude);
                        map.centerAndZoom(myLocation, 16);
                        var marker = new BMap.Marker(myLocation);
                        map.clearOverlays();
                        map.addOverlay(marker);
                        marker.setLabel(new BMap.Label("我的位置", { offset: new BMap.Size(20, -10) }));
                        if (callback) callback(myLocation);
                    },
                    function(error) {
                        var msg = "定位失败：";
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                msg += "请允许定位权限"; break;
                            case error.POSITION_UNAVAILABLE:
                                msg += "位置信息不可用，请移到开阔地带试试"; break;
                            case error.TIMEOUT:
                                msg += "定位超时，请检查网络和GPS"; break;
                        }
                        alert(msg);
                    },
                    options
                );
            } else {
                alert("您的浏览器不支持定位功能");
            }
        }

        // ========== 搜索目的地并规划路线 ==========
        function searchAndRoute(destinationName) {
            if (!myLocation) {
                alert("请先获取或手动设置起点位置");
                return;
            }
            var geo = new BMap.Geocoder();
            geo.getPoint(destinationName, function(point) {
                if (point) {
                    destinationPoint = point;
                    planRoute(myLocation, destinationPoint);
                } else {
                    alert("找不到该地点，请换个关键词试试");
                }
            }, "全国");
        }

        // ========== 路线规划 ==========
        function planRoute(start, end) {
            map.clearOverlays();

            // 起点标记
            var startMarker = new BMap.Marker(start);
            map.addOverlay(startMarker);
            startMarker.setLabel(new BMap.Label("起点", { offset: new BMap.Size(20, -10) }));

            // 终点标记
            var endMarker = new BMap.Marker(end);
            map.addOverlay(endMarker);
            endMarker.setLabel(new BMap.Label("目的地", { offset: new BMap.Size(20, -10) }));

            // 根据模式选择路线
            var routeOptions = {
                renderOptions: { map: map, autoViewport: true },
                onSearchComplete: function(results) {
                    if (results.getStatus() === BMAP_STATUS_SUCCESS) {
                        currentRoute = results;
                        showRouteInfo(currentRoute);
                        // 路线规划成功后，显示“开始导航”按钮
                        document.getElementById('btn-start-nav').style.display = 'block';
                    }
                }
            };

            if (travelMode === 'driving') {
                var driving = new BMap.DrivingRoute(map, routeOptions);
                driving.search(start, end);
            } else {
                var walking = new BMap.WalkingRoute(map, routeOptions);
                walking.search(start, end);
            }
        }

        // ========== 显示路线信息 ==========
        function showRouteInfo(routeResult) {
            var plan = routeResult.getPlan(0);
            var distance = (plan.getDistance(false) / 1000).toFixed(2); // 公里
            var time = plan.getDuration(true); // 格式化时间

            document.getElementById('distance-text').textContent = distance + ' 公里';
            document.getElementById('time-text').textContent = '预计用时：' + time;
        }

        // ========== 实时更新距离（直线距离） ==========
        function updateRealtimeDistance() {
            if (!myLocation || !destinationPoint) return;
            var dist = map.getDistance(myLocation, destinationPoint);
            var distKm = (dist / 1000).toFixed(2);
            // 注意：此时显示的是直线距离，路线距离在showRouteInfo里会更新
            if (!document.getElementById('btn-start-nav').style.display || document.getElementById('btn-start-nav').style.display === 'none') {
                document.getElementById('distance-text').textContent = distKm + ' 公里（直线）';
            }
        }

        // ========== 手动定位功能 ==========
        document.getElementById('btn-manual-locate').addEventListener('click', function() {
            var center = map.getCenter();
            myLocation = center;
            isManualLocationSet = true; // 锁定起点，GPS不再自动重规划

            map.clearOverlays();
            var newMarker = new BMap.Marker(center);
            map.addOverlay(newMarker);
            newMarker.setLabel(new BMap.Label("起点(手动)", { offset: new BMap.Size(20, -10) }));

            // 如果已有终点，则立即用新起点重新规划路线
            if (destinationPoint) {
                planRoute(myLocation, destinationPoint);
            }

            alert("手动定位成功！起点已锁定，后续移动不会改变。");
        });

        // ========== 开始导航按钮 ==========
        document.getElementById('btn-start-nav').addEventListener('click', function() {
            if (myLocation && destinationPoint) {
                map.setViewport([myLocation, destinationPoint]);
                alert("导航已开始！请沿路线行驶。");
                this.textContent = "导航中...";
                this.disabled = true;
            }
        });

        // ========== 按钮事件绑定 ==========
        document.getElementById('btn-driving').addEventListener('click', function() {
            travelMode = 'driving';
            this.classList.add('active');
            document.getElementById('btn-walking').classList.remove('active');
            if (myLocation && destinationPoint) planRoute(myLocation, destinationPoint);
        });

        document.getElementById('btn-walking').addEventListener('click', function() {
            travelMode = 'walking';
            this.classList.add('active');
            document.getElementById('btn-driving').classList.remove('active');
            if (myLocation && destinationPoint) planRoute(myLocation, destinationPoint);
        });

        document.getElementById('btn-go').addEventListener('click', function() {
            var dest = document.getElementById('destination').value.trim();
            if (!dest) {
                alert('请输入目的地');
                return;
            }
            searchAndRoute(dest);
        });

        // 支持回车键触发导航
        document.getElementById('destination').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('btn-go').click();
        });

        // ========== 启动时获取位置 ==========
        getMyLocation();

        // ========== 每3秒更新一次直线距离 ==========
        setInterval(updateRealtimeDistance, 3000);

        // ========== 持续位置监听（优化版，手动定位后只更新坐标不重规划） ==========
        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(function(pos) {
                if (isManualLocationSet) return; // 手动定位后，直接忽略GPS更新，不改变起点

                var newPoint = new BMap.Point(
                    pos.coords.longitude,
                    pos.coords.latitude
                );
                // 移动超过20米才更新
                if (myLocation && map.getDistance(myLocation, newPoint) > 20) {
                    myLocation = newPoint;
                    // 未手动定位且有目的地时，才自动重新规划路线
                    if (destinationPoint) planRoute(myLocation, destinationPoint);
                }
            }, function(error) {
                console.log('位置更新出错：', error.message);
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        }
    </script>
</body>
</html>
